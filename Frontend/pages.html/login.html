<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Driver Login - NY State Patrol</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <nav id="navbar">
      <a href="../index.html" id="nav-logo">NY State Patrol</a>
      <button class="hamburger" id="hamburger">☰</button>
      <div id="nav-links">
        <a href="../index.html">Home</a>
        <a href="admin-login.html">Admin Login</a>
      </div>
    </nav>

    <div class="page-wrap">
      <div class="form-box">
        <h2>Driver Login</h2>

        <div id="login-error" class="api-error" style="display: none"></div>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" />
          <span class="error-msg" id="username-error"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
          />
          <span class="error-msg" id="password-error"></span>
        </div>

        <button class="submit-btn" id="login-btn">Login</button>

        <div class="form-link">
          <p>
            Don't have an account? <a href="register.html">Register here</a>
          </p>
        </div>
      </div>
    </div>

    <script src="../scripts.js/login.js"></script>
    <script src="../scripts.js/nav.js"></script>
  </body>
</html>
