<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile - NY State Patrol</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <nav class="nav-logged">
      <a href="../index.html" class="nav-logged-left">NY State Patrol</a>
      <button class="hamburger" id="hamburger">☰</button>
      <div class="nav-logged-right" id="nav-menu">
        <a href="dashboard.html">My Citations</a>
        <a href="profile.html">My Profile</a>
        <button class="logout-btn" id="logout-btn">Logout</button>
      </div>
    </nav>

    <div id="dashboard-wrap">
      <h2>My Profile</h2>

      <div id="profile-success" class="success-msg" style="display: none"></div>
      <div id="profile-error" class="api-error" style="display: none"></div>

      <div id="loading-profile" class="loading-msg">
        Loading your details...
      </div>

      <div id="profile-form" style="display: none">
        <p class="section-label">Account Information</p>
        <div class="info-box">
          <p>
            <span class="info-label">Username:</span>
            <span id="p-username"></span>
          </p>
          <p><span class="info-label">Role:</span> <span id="p-role"></span></p>
        </div>

        <p class="section-label">Personal Details</p>
        <div class="form-group">
          <label for="first-name">First Name</label>
          <input type="text" id="first-name" />
          <span class="error-msg" id="first-name-error"></span>
        </div>

        <div class="form-group">
          <label for="last-name">Last Name</label>
          <input type="text" id="last-name" />
          <span class="error-msg" id="last-name-error"></span>
        </div>

        <div class="form-group">
          <label for="birth-date">Date of Birth</label>
          <input type="date" id="birth-date" />
          <span class="error-msg" id="birth-date-error"></span>
        </div>

        <p class="section-label">Contact Details</p>
        <div class="form-group">
          <label for="address">Address</label>
          <input type="text" id="address" />
          <span class="error-msg" id="address-error"></span>
        </div>

        <div class="form-group">
          <label for="city">City</label>
          <input type="text" id="city" />
          <span class="error-msg" id="city-error"></span>
        </div>

        <div class="form-group">
          <label for="state">State</label>
          <input type="text" id="state" maxlength="2" />
          <span class="error-msg" id="state-error"></span>
        </div>

        <div class="form-group">
          <label for="zip-code">Zip Code</label>
          <input type="text" id="zip-code" />
          <span class="error-msg" id="zip-code-error"></span>
        </div>

        <p class="section-label">Licence Details</p>
        <div class="form-group">
          <label for="dl-number">Licence Number</label>
          <input type="text" id="dl-number" />
          <span class="error-msg" id="dl-number-error"></span>
        </div>

        <div class="form-group">
          <label for="licence-state">Licence State</label>
          <input type="text" id="licence-state" maxlength="2" />
          <span class="error-msg" id="licence-state-error"></span>
        </div>

        <button class="submit-btn" id="save-btn">Save Changes</button>
      </div>
    </div>

    <script src="../scripts.js/profile.js"></script>
  </body>
</html>
