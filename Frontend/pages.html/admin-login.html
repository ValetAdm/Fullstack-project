<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - NY State Patrol</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <nav id="navbar">
      <a href="../index.html" id="nav-logo">NY State Patrol</a>
      <button class="hamburger" id="hamburger">☰</button>
      <div id="nav-links">
        <a href="../index.html">Home</a>
        <a href="login.html">Driver Login</a>
      </div>
    </nav>

    <div class="page-wrap">
      <div class="form-box">
        <h2>Admin Login</h2>
        <p
          style="
            text-align: center;
            color: #555;
            font-size: 0.9rem;
            margin-bottom: 20px;
          "
        >
          For NYPD officers and system administrators only
        </p>

        <div id="login-error" class="api-error" style="display: none"></div>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" />
          <span class="error-msg" id="username-error"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
          />
          <span class="error-msg" id="password-error"></span>
        </div>

        <button class="submit-btn" id="login-btn">Login</button>

        <div class="form-link">
          <p>Not an admin? <a href="login.html">Driver login here</a></p>
        </div>
      </div>
    </div>

    
    <script src="../scripts.js/nav.js"></script>
    <script src="../scripts.js/admin-login.js"></script>
  </body>
</html>
